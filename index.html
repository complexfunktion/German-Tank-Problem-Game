<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>German Tank Game</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(#87ceeb, #e0e0e0);
}

#game {
  margin-top: 20px;
  min-height: 120px;
}

.tank {
  position: relative;
  display: inline-block;
  margin: 15px;
  opacity: 0;
  left: -120px;
  animation: slide 0.6s forwards;
}

.tank img {
  width: 100px;
}

.serial {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 3px black;
}

@keyframes slide {
  to { opacity:1; left:0; }
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

input, button, select {
  margin: 10px;
  padding: 8px;
}
</style>
</head>

<body>

<h1>ドイツ戦車問題ゲーム</h1>

<div>
難易度：
<select id="difficulty">
  <option value="easy">初級（第2帝国）</option>
  <option value="normal">中級（第3帝国）</option>
  <option value="hard">上級（DDR）</option>
  <option value="custom">カスタム（現代）</option>
</select>
</div>

<button onclick="startGame()">ゲーム開始</button>

<div id="status"></div>
<div id="game"></div>

<div>
推定値 N：
<input type="number" id="guess">
<button onclick="submitAnswer()">決定</button>
</div>

<div id="result"></div>

<script>
let trueN, sample;
let round = 1;
let totalScore = 0;
const maxRounds = 5;

// 難易度ごとの設定
function getSettings() {
  const d = document.getElementById("difficulty").value;

  if (d === "easy") {
    return {minN:20, maxN:100, k:7, img:"tank1.png", era:"ドイツ第2帝国"};
  }
  if (d === "normal") {
    return {minN:50, maxN:300, k:5, img:"tank2.png", era:"ドイツ第3帝国"};
  }
  if (d === "hard") {
    return {minN:100, maxN:1000, k:3, img:"tank3.png", era:"DDR"};
  }
  return {minN:50, maxN:500, k:4, img:"tank4.png", era:"現代ドイツ"};
}

// N生成
function generateTrueN(min, max) {
  return Math.floor(Math.random()*(max-min+1)) + min;
}

// サンプル生成
function generateSample(N, k) {
  const arr = Array.from({length:N}, (_,i)=>i+1);
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr.slice(0,k).sort((a,b)=>a-b);
}

// ラウンド開始
function startRound() {
  const s = getSettings();

  document.getElementById("result").textContent = "";
  document.getElementById("guess").value = "";

  trueN = generateTrueN(s.minN, s.maxN);
  sample = generateSample(trueN, s.k);

  document.getElementById("status").textContent =
    s.era + " ｜ ラウンド " + round + "/" + maxRounds +
    " ｜ スコア: " + totalScore;

  const gameDiv = document.getElementById("game");
  gameDiv.innerHTML = "";

  sample.forEach((n, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "tank";

      const img = document.createElement("img");
      img.src = s.img;

      const label = document.createElement("div");
      label.className = "serial";
      label.textContent = "No." + n;

      div.appendChild(img);
      div.appendChild(label);
      gameDiv.appendChild(div);
    }, i * 500);
  });
}

// ゲーム開始
function startGame() {
  round = 1;
  totalScore = 0;
  startRound();
}

// 推定
function estimate(sample) {
  const k = sample.length;
  const m = Math.max(...sample);
  return Math.round(m + m/k - 1);
}

// スコア
function score(guess, trueN) {
  const err = Math.abs(guess - trueN)/trueN;
  if (err < 0.05) return 100;
  if (err < 0.1) return 70;
  if (err < 0.2) return 40;
  return 10;
}

// 回答
function submitAnswer() {
  const guess = parseInt(document.getElementById("guess").value);
  if (!guess) return;

  const est = estimate(sample);
  const s = score(guess, trueN);
  totalScore += s;

  document.getElementById("result").innerHTML =
    "正解: " + trueN + "<br>" +
    "あなた: " + guess + "<br>" +
    "最適推定: " + est + "<br>" +
    "今回スコア: " + s;

  round++;

  if (round > maxRounds) {
    document.getElementById("status").textContent =
      "終了！合計スコア: " + totalScore;
  } else {
    setTimeout(startRound, 2000);
  }
}
</script>

</body>
</html>
