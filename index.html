<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>German Tank Game</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f0f0f0;
}

h1 {
  margin-top: 20px;
}

#game {
  margin-top: 20px;
  min-height: 100px;
}

.tank {
  position: relative;
  display: inline-block;
  margin: 10px;
  padding: 15px;
  background: #333;
  color: white;
  border-radius: 8px;
  min-width: 60px;
  opacity: 0;
  left: -100px;
  animation: slide 0.5s forwards;
}

@keyframes slide {
  to {
    opacity: 1;
    left: 0;
  }
}

input, button, select {
  margin: 10px;
  padding: 8px;
  font-size: 16px;
}

#result {
  margin-top: 20px;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>ドイツ戦車問題ゲーム</h1>

<div>
難易度：
<select id="difficulty">
  <option value="easy">初級</option>
  <option value="normal">中級</option>
  <option value="hard">上級</option>
</select>
</div>

<button onclick="startGame()">ゲーム開始</button>

<div id="status"></div>

<div id="game"></div>

<div>
推定値 N：
<input type="number" id="guess">
<button onclick="submitAnswer()">決定</button>
</div>

<div id="result"></div>

<script>
let trueN, sample;
let round = 1;
let totalScore = 0;
const maxRounds = 5;

// 難易度
function getSettings() {
  const d = document.getElementById("difficulty").value;
  if (d === "easy") return {minN:20, maxN:100, k:7};
  if (d === "normal") return {minN:50, maxN:300, k:5};
  return {minN:100, maxN:1000, k:3};
}

// N生成
function generateTrueN(min, max) {
  return Math.floor(Math.random()*(max-min+1)) + min;
}

// サンプル生成
function generateSample(N, k) {
  const arr = Array.from({length:N}, (_,i)=>i+1);
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr.slice(0,k).sort((a,b)=>a-b);
}

// ラウンド開始
function startRound() {
  document.getElementById("result").textContent = "";
  document.getElementById("guess").value = "";

  const s = getSettings();
  trueN = generateTrueN(s.minN, s.maxN);
  sample = generateSample(trueN, s.k);

  document.getElementById("status").textContent =
    "ラウンド " + round + " / " + maxRounds;

  const gameDiv = document.getElementById("game");
  gameDiv.innerHTML = "";

  // 時間差表示
  sample.forEach((n, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "tank";
      div.style.animationDelay = "0s";
      div.textContent = "No." + n;
      gameDiv.appendChild(div);
    }, i * 500);
  });
}

// ゲーム開始
function startGame() {
  round = 1;
  totalScore = 0;
  startRound();
}

// 推定
function estimate(sample) {
  const k = sample.length;
  const m = Math.max(...sample);
  return Math.round(m + m/k - 1);
}

// スコア
function score(guess, trueN) {
  const err = Math.abs(guess - trueN)/trueN;
  if (err < 0.05) return 100;
  if (err < 0.1) return 70;
  if (err < 0.2) return 40;
  return 10;
}

// 回答
function submitAnswer() {
  const guess = parseInt(document.getElementById("guess").value);
  if (!guess) return;

  const est = estimate(sample);
  const s = score(guess, trueN);
  totalScore += s;

  document.getElementById("result").innerHTML =
    "正解: " + trueN + "<br>" +
    "あなた: " + guess + "<br>" +
    "最適推定: " + est + "<br>" +
    "今回スコア: " + s;

  round++;

  if (round > maxRounds) {
    document.getElementById("status").textContent =
      "終了！合計スコア: " + totalScore;
  } else {
    setTimeout(startRound, 2000);
  }
}
</script>

</body>
</html>
