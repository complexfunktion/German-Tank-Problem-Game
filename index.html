<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>German Tank Problem Game</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(#87ceeb, #e0e0e0);
}

/* 画面切替 */
.screen { display: none; }
.active { display: block; }

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 18px;
}

/* 難易度UI */
.difficultyRow {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.ai { width: 70px; }

/* ゲーム */
#game { margin-top: 20px; min-height: 120px; }

.tank {
  display: inline-block;
  margin: 15px;
  opacity: 0;
  transform: translateX(120px);
  animation: slide 0.6s forwards;
}

.tank img { width: 100px; }

.serial {
  position: relative;
  top: -30px;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 3px black;
}

@keyframes slide {
  from { opacity:0; transform: translateX(120px);}
  to { opacity:1; transform: translateX(0);}
}
/* 難易度ボタン色 */
.easyBtn {
  background-color: white;
  color: black;
  border: 2px solid black;
}

.normalBtn {
  background-color: black;
  color: white;
  border: 2px solid black;
}

.hardBtn {
  background-color: red;
  color: white;
  border: 2px solid darkred;
}

.customBtn {
  background-color: yellow;
  color: black;
  border: 2px solid goldenrod;
}
</style>
</head>

<body>

<!-- タイトル -->
<div id="titleScreen" class="screen active">
  <h1>ドイツ戦車問題ゲーム</h1>
  <button onclick="goToSelect()">START</button>
  <button onclick="goToSettings()">SETTINGS</button>
</div>

<!-- 設定 -->
<div id="settingsScreen" class="screen">
  <h2>音楽設定</h2>

  <label><input type="radio" name="bgm" value="off"> OFF</label><br>
  <label><input type="radio" name="bgm" value="music1.mp3"> 曲1</label><br>
  <label><input type="radio" name="bgm" value="music2.mp3"> 曲2</label><br>
  <label><input type="radio" name="bgm" value="music3.mp3"> 曲3</label><br>

  <button onclick="saveSettings()">保存</button>
  <button onclick="backToTitle()">戻る</button>
</div>

<!-- 難易度 -->
<div id="selectScreen" class="screen">
  <h2>難易度選択</h2>

  <div class="difficultyRow" onmouseover="hoverAi(this,'easy',true)" onmouseout="hoverAi(this,'easy',false)">
    <button class="easyBtn" onclick="startGame('easy')">初級</button>
    <img class="ai" src="easy_normal.png">
  </div>

  <div class="difficultyRow" onmouseover="hoverAi(this,'normal',true)" onmouseout="hoverAi(this,'normal',false)">
    <button class="normalBtn" onclick="startGame('normal')">中級</button>
    <img class="ai" src="normal_normal.png">
  </div>

  <div class="difficultyRow" onmouseover="hoverAi(this,'hard',true)" onmouseout="hoverAi(this,'hard',false)">
    <button class="hardBtn" onclick="startGame('hard')">上級</button>
    <img class="ai" src="hard_normal.png">
  </div>

  <div class="difficultyRow" onmouseover="hoverAi(this,'custom',true)" onmouseout="hoverAi(this,'custom',false)">
    <button class="customBtn" onclick="openCustom()">カスタム</button>
    <img class="ai" src="custom_normal.png">
  </div>

  <div id="customSettings" style="display:none;">
    <p>カスタム設定</p>
    minN <input id="minN" type="number" value="50"><br>
    maxN <input id="maxN" type="number" value="200"><br>
    k <input id="k" type="number" value="5"><br>
    <button onclick="startGame('custom')">これでプレイ</button>
  </div>

  <button onclick="backToTitle()">戻る</button>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="screen">
  <h2 id="status"></h2>

  <!-- アイ -->
  <img id="gameAi" src="easy_normal.png" style="width:90px;">

  <div id="game"></div>

  <div>
    推定値 N：
    <input type="number" id="guess">
    <button id="actionBtn" onclick="submitAnswer()">決定</button>
  </div>

  <div id="result"></div>
</div>

<script>
let trueN, sample;
let round, totalScore;
let currentSettings;

let bgm = null;
let bgmSetting = "off";

/* アイテーマ */
const aiTheme = {
  easy: "easy",
  normal: "normal",
  hard: "hard",
  custom: "custom"
};
let currentTheme = "easy";

/* 画面 */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goToSelect(){
  showScreen("selectScreen");
  document.getElementById("customSettings").style.display = "none";
}

function backToTitle(){
  showScreen("titleScreen");
}

function openCustom(){
  document.getElementById("customSettings").style.display = "block";
}

/* ホバー */
function hoverAi(el,type,isHover){
  const img = el.querySelector(".ai");
  img.src = `${type}_${isHover ? "hover" : "normal"}.png`;
}

/* 設定 */
function getSettings(d){
  if (d==="easy") return {minN:20,maxN:100,k:8,img:"tank1.png",era:"第2帝国"};
  if (d==="normal") return {minN:50,maxN:300,k:5,img:"tank2.png",era:"第3帝国"};
  if (d==="hard") return {minN:100,maxN:1000,k:3,img:"tank3.png",era:"DDR"};

  // カスタム
  const minN = parseInt(document.getElementById("minN").value);
  const maxN = parseInt(document.getElementById("maxN").value);
  const k = parseInt(document.getElementById("k").value);

  if (k >= minN){
  alert("k < minN にしてください");
  return null;
}

return {minN,maxN,k,img:"tank4.png",era:"現代"};
}
/* 開始 */
function startGame(diff){
  currentTheme = aiTheme[diff];

  const btn = document.getElementById("actionBtn");
  btn.textContent = "決定";
  btn.onclick = submitAnswer;

  if (bgmSetting!=="off" && !bgm){
    bgm=new Audio(bgmSetting);
    bgm.loop=true;
    bgm.play();
  }

  const s=getSettings(diff);
  if(!s) return;

  currentSettings=s;
  round=1;
  totalScore=0;

  showScreen("gameScreen");
  startRound();
}

/* ラウンド */
function startRound(){
  document.getElementById("result").textContent="";
  guess.value="";

  /* 表情リセット */
  gameAi.src = `${currentTheme}_normal.png`;

  trueN=Math.floor(Math.random()*(currentSettings.maxN-currentSettings.minN+1))+currentSettings.minN;

  const arr=Array.from({length:trueN},(_,i)=>i+1);
  arr.sort(()=>Math.random()-0.5);
  sample=arr.slice(0,currentSettings.k).sort((a,b)=>a-b);
  document.getElementById("status").textContent =`V.S.${currentSettings.era} | ラウンド ${round}/5 | スコア ${totalScore}`;

  game.innerHTML="";

  sample.forEach((n,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="tank";

      const img=document.createElement("img");
      img.src=currentSettings.img;

      const label=document.createElement("div");
      label.className="serial";
      label.textContent="No."+n;

      div.appendChild(img);
      div.appendChild(label);
      game.appendChild(div);
    },i*500);
  });
}

/* 推定 */
function estimate(){
  const k=sample.length;
  const m=Math.max(...sample);
  return Math.round(m + m/k -1);
}

/* 回答 */
function submitAnswer(){
  const guessVal=parseInt(guess.value);
  if(!guessVal) return;

  const err = Math.abs(guessVal - trueN) / trueN;
  let s = Math.floor(100 * Math.pow(1 - err, 2));
  s = Math.max(0, s);
  totalScore+=s;

  result.innerHTML =
  `正解 ${trueN}<br>
   あなた ${guessVal}<br>
   誤差 ${(err*100).toFixed(1)}%<br>
   スコア ${s}`;

  /* 表情変化 */
  if(s<40) gameAi.src=`${currentTheme}_sad.png`;
  else if(s<70) gameAi.src=`${currentTheme}_normal.png`;
  else gameAi.src=`${currentTheme}_happy.png`;

  round++;

  if(round>5){
    document.getElementById("status").textContent =`終了！合計スコア ${totalScore}`;
    btn.textContent="戻る";
    btn.onclick=backToTitle;
  }else{
    setTimeout(startRound,2000);
  }
}

/* BGM */
function goToSettings(){ showScreen("settingsScreen"); }

function saveSettings(){
  const selected=document.querySelector('input[name="bgm"]:checked').value;
  bgmSetting=selected;

  if(bgm){ bgm.pause(); bgm=null; }

  if(bgmSetting!=="off"){
    bgm=new Audio(bgmSetting);
    bgm.loop=true;
    bgm.play();
  }

  localStorage.setItem("bgmSetting",bgmSetting);
  backToTitle();
}

window.onload=function(){
  const saved=localStorage.getItem("bgmSetting");
  if(saved){
    bgmSetting=saved;
    document.querySelector(`input[value="${saved}"]`).checked=true;
  }
};
</script>

</body>
</html>
